steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/appmobile-api:$COMMIT_SHA', '-f', 'api/Dockerfile', 'api/']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/appmobile-api:$COMMIT_SHA']

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'appmobile-api'
  - '--image'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/appmobile-api:$COMMIT_SHA'
  - '--region'
  - 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
